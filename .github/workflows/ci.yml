name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20 # package.json engines: node >=20
          cache: npm

      - run: npm ci

      # The gate: typecheck + the full suite (incl. fast-check property tests).
      - name: Typecheck
        run: npm run typecheck

      # Tests run against MemoryStore + the fake Stripe gateway + the template
      # negotiator — no DATABASE_URL, no STRIPE_*/ANTHROPIC_API_KEY needed. Any test
      # that fails for lack of a secret is a test that shouldn't require one in CI.
      - name: Tests (DATABASE_URL unset — MemoryStore path)
        run: npm test

      # The suite is DB-agnostic (tests construct MemoryStore directly); prove it
      # stays green with DATABASE_URL set too, matching the local invariant.
      - name: Tests (DATABASE_URL set — DB-agnostic check)
        run: npm test
        env:
          DATABASE_URL: postgres://user:pass@localhost:5432/none

  # PostgresStore against REAL Postgres — the production datastore path. Proves the
  # money-critical guarantees (atomic single-use under concurrency, the store
  # contract) hold on real isolation, not just the in-memory Map. Gates merges.
  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: PostgresStore suite (real Postgres service container)
        run: npm run test:pg
        env:
          # Dedicated throwaway DB — the harness resets the `bouncr` schema fresh.
          BOUNCR_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
