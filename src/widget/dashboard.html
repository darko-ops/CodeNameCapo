<html lang="en">

<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
  :root { --accent: #7C3AED; --mint: #34D399; --ok: #34D399; --warn: #d9941f; --err: #f87171; --line: #23232e; --muted: #8b8b99; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.5 ui-sans-serif, system-ui, sans-serif; color: #ECECF1; background: #0B0B12; }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 28px 22px 64px; }
  h1 { font-size: 24px; margin: 0 0 4px; letter-spacing: -0.4px; }
  .sub { color: var(--muted); margin: 0 0 20px; }
  .bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 22px; }
  input { border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; font: inherit; background: #14141c; color: var(--text); }
  input::placeholder { color: #5a5a6a; }
  button { background: var(--accent); color: #fff; border: 0; border-radius: 8px; padding: 8px 14px; font-weight: 600; cursor: pointer; }
  button.ghost { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 22px; }
  .card { background: #15151f; border: 1px solid var(--line); border-radius: 14px; padding: 16px; }
  .card h3 { margin: 0 0 8px; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); font-weight: 700; }
  .big { font-size: 30px; font-weight: 800; letter-spacing: -0.5px; }
  .panel { background: #15151f; border: 1px solid var(--line); border-radius: 14px; padding: 18px; margin-bottom: 18px; }
  .panel h2 { margin: 0 0 12px; font-size: 16px; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }
  .badge.ok { background: rgba(52,211,153,.12); color: var(--ok); } .badge.no { background: rgba(248,113,113,.12); color: var(--err); }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 7px 8px; border-bottom: 1px solid #1d1d27; }
  th { color: var(--muted); font-weight: 600; font-size: 12px; }
  tr.session { cursor: pointer; } tr.session:hover { background: #1a1a22; }
  .pill { font-size: 11px; padding: 2px 7px; border-radius: 999px; background: #1d1d27; }
  .pill.settled { background: rgba(52,211,153,.12); color: var(--ok); } .pill.walked { background: rgba(248,113,113,.12); color: var(--err); }
  .pill.accepted { background: rgba(124,58,237,.14); color: #a78bfa; }
  .tactics div { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  .tactics .tb { height: 10px; background: var(--accent); border-radius: 4px; }
  #drawer { position: fixed; top: 0; right: 0; width: 420px; max-width: 92vw; height: 100vh; background: #14141c; border-left: 1px solid var(--line); box-shadow: -10px 0 30px rgba(0,0,0,.5); transform: translateX(100%); transition: transform .2s; overflow-y: auto; padding: 18px; }
  #drawer.open { transform: none; }
  .msg { padding: 8px 11px; border-radius: 12px; margin: 6px 0; max-width: 85%; white-space: pre-wrap; }
  .msg.user { background: var(--accent); color: #fff; margin-left: auto; } .msg.bot { background: #1d1d27; }
  .meta { font-size: 11px; color: var(--muted); margin: 1px 4px 8px; }
  canvas { width: 100%; max-width: 100%; }
  .err { color: var(--err); }
  .lint { font-size: 13px; } .lint .e { color: var(--err); } .lint .w { color: var(--warn); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Bouncr — WTP dashboard</h1>
  <p class="sub">Your true demand curve, from your own negotiations.</p>

  <div class="bar">
    <input id="base" placeholder="API base" size="22" />
    <input id="plan" placeholder="plan_id" value="plan_demo" size="12" />
    <input id="merchant" placeholder="merchant_id" value="merchant_demo" size="14" />
    <input id="key" placeholder="x-api-key (if set)" size="18" />
    <button id="refresh">Refresh</button>
    <span id="status"></span>
  </div>

  <div class="panel" id="connect-panel">
    <h2>Settlement</h2>
    <div>Stripe Connect: <span id="connect-badge" class="badge no">checking…</span>
      <button class="ghost" id="connect-btn" style="margin-left:10px">Connect Stripe</button></div>
    <div style="margin-top:10px">Bouncr take-rate: <b id="take-rate" style="color:var(--accent)">—</b>
      <span class="meta" id="take-note"></span></div>
    <div class="lint" id="lint" style="margin-top:10px"></div>
  </div>

  <div class="grid" id="funnel"></div>

  <div class="panel">
    <h2>Offer distribution</h2>
    <canvas id="hist" height="220"></canvas>
    <div class="meta" id="hist-legend"></div>
  </div>

  <div class="grid" id="closing"></div>

  <div class="panel">
    <h2>Tactics used</h2>
    <div class="tactics" id="tactics"></div>
  </div>

  <div class="panel">
    <h2>Recent negotiations</h2>
    <table><thead><tr><th>User</th><th>Status</th><th>Round</th><th>Ask</th></tr></thead>
      <tbody id="sessions"></tbody></table>
  </div>
</div>

<div id="drawer"><button class="ghost" onclick="document.getElementById('drawer').classList.remove('open')">Close</button>
  <h2 id="drawer-title" style="margin-top:12px"></h2><div id="transcript"></div></div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  $("base").value = location.origin;
  const KEY = "bouncr_dash";
  try { Object.assign(state(), JSON.parse(localStorage.getItem(KEY) || "{}")); } catch (_) {}
  function state() { return { base: $("base"), plan: $("plan"), merchant: $("merchant"), key: $("key") }; }
  ["base","plan","merchant","key"].forEach((id) => { const v = localStorage.getItem(KEY + "_" + id); if (v) $(id).value = v; });
  function persist() { ["base","plan","merchant","key"].forEach((id) => localStorage.setItem(KEY + "_" + id, $(id).value)); }

  const api = (path) => {
    const h = {}; const k = $("key").value.trim(); if (k) h["x-api-key"] = k;
    return fetch($("base").value.replace(/\/$/, "") + path, { headers: h });
  };
  const apiPost = (path, body) => {
    const h = { "content-type": "application/json" }; const k = $("key").value.trim(); if (k) h["x-api-key"] = k;
    return fetch($("base").value.replace(/\/$/, "") + path, { method: "POST", headers: h, body: JSON.stringify(body || {}) });
  };

  function card(label, value) { return `<div class="card"><h3>${label}</h3><div class="big">${value}</div></div>`; }

  async function load() {
    persist();
    $("status").textContent = "loading…";
    try {
      const a = await (await api("/v1/analytics/wtp?plan_id=" + encodeURIComponent($("plan").value))).json();
      if (a.error) throw new Error(a.error);
      renderFunnel(a); renderClosing(a); renderTactics(a); renderHist(a);
      await renderSessions();
      await renderConnect();
      await renderLint();
      $("status").textContent = "";
    } catch (e) { $("status").innerHTML = '<span class="err">' + e.message + "</span>"; }
  }

  function renderFunnel(a) {
    const f = a.funnel;
    $("funnel").innerHTML =
      card("Sessions", f.sessions) + card("Engaged", f.engaged) +
      card("Accepted", f.accepted) + card("Settled", f.settled) +
      card("Walk rate", pct(walks(f) , f.sessions));
  }
  function walks(f) { return Object.values(f.walkByRound).reduce((x, y) => x + y, 0); }
  function pct(n, d) { return d ? Math.round((100 * n) / d) + "%" : "—"; }

  function renderClosing(a) {
    const c = a.closing, m = a.monetization || { takeRatePercent: 0, bouncrFee: 0, merchantNet: c.revenue };
    $("closing").innerHTML =
      card("Median price", c.medianPrice != null ? "$" + c.medianPrice : "—") +
      card("Avg rounds", c.avgRoundsToClose != null ? c.avgRoundsToClose : "—") +
      card("Revenue", "$" + c.revenue) +
      card("Bouncr take (" + m.takeRatePercent + "%)", "$" + m.bouncrFee) +
      card("Your net", "$" + m.merchantNet) +
      card("Capture vs list", c.upliftPct != null ? c.upliftPct + "%" : "—");
    // Settlement panel take-rate line.
    $("take-rate").textContent = m.takeRatePercent + "%";
    $("take-note").textContent = m.takeRatePercent > 0
      ? "of each settled invoice → Bouncr (Connect application fee)"
      : "no platform fee on this plan";
  }

  function renderTactics(a) {
    const t = a.tactics, keys = Object.keys(t).sort((x, y) => t[y] - t[x]);
    $("tactics").innerHTML = keys.length
      ? keys.map((k) => `<div><span style="width:140px;display:inline-block">${k}</span><span class="tb" style="width:${Math.max(6, t[k] * 200)}px"></span><span class="meta">${Math.round(t[k]*100)}%</span></div>`).join("")
      : '<span class="meta">No tactics recorded yet.</span>';
  }

  function renderHist(a) {
    const ref = a.reference;
    const data = a.offers.firstOffers.concat(a.offers.closingPrices);
    const cv = $("hist"); const ctx = cv.getContext("2d");
    const W = cv.width = cv.clientWidth * 2, H = cv.height = 440; ctx.scale(1,1);
    ctx.clearRect(0, 0, W, H);
    const max = Math.max(ref.anchor * 1.1, ...(data.length ? data : [ref.anchor]));
    const bins = 24, counts = new Array(bins).fill(0);
    for (const v of data) { const i = Math.min(bins - 1, Math.floor((v / max) * bins)); counts[i]++; }
    const peak = Math.max(1, ...counts);
    const pad = 30, bw = (W - pad * 2) / bins;
    // bars
    ctx.fillStyle = "#7C3AED";
    counts.forEach((n, i) => { const h = (n / peak) * (H - pad * 2); ctx.fillRect(pad + i * bw + 2, H - pad - h, bw - 4, h); });
    // reference lines
    const lineAt = (val, color, label) => {
      const x = pad + (val / max) * (W - pad * 2);
      ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.setLineDash([5, 4]);
      ctx.beginPath(); ctx.moveTo(x, pad / 2); ctx.lineTo(x, H - pad); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle = color; ctx.font = "20px sans-serif"; ctx.fillText(label, x + 3, pad);
    };
    lineAt(ref.floor, "#f87171", "floor $" + ref.floor);   // red — the line you never cross
    lineAt(ref.target, "#34D399", "target $" + ref.target); // mint — the goal / win line
    lineAt(ref.list, "#8b8b99", "list $" + ref.list);      // gray — reference
    $("hist-legend").innerHTML = `Bars: first offers + closing prices (n=${data.length}). Lines: floor / target / list.`;
  }

  async function renderSessions() {
    const r = await (await api("/v1/plans/" + encodeURIComponent($("plan").value) + "/sessions")).json();
    const rows = (r.sessions || []).slice(0, 25).map((s) =>
      `<tr class="session" data-id="${s.id}"><td>${s.end_user_ref}</td><td><span class="pill ${s.status}">${s.status}</span></td><td>${s.round}</td><td>$${s.current_ask}</td></tr>`).join("");
    $("sessions").innerHTML = rows || '<tr><td colspan="4" class="meta">No sessions yet.</td></tr>';
    document.querySelectorAll("tr.session").forEach((tr) => tr.onclick = () => openTranscript(tr.dataset.id));
  }

  async function openTranscript(id) {
    const r = await (await api("/v1/sessions/" + id + "/transcript")).json();
    $("drawer-title").textContent = (r.session.end_user_ref || "session") + " · " + r.session.status;
    $("transcript").innerHTML = (r.turns || []).map((t) => {
      const meta = t.extracted ? `intent: ${t.extracted.intent}${t.extracted.offer_amount != null ? " · offer $" + t.extracted.offer_amount : ""}${t.extracted.tactics && t.extracted.tactics.length ? " · " + t.extracted.tactics.join("/") : ""}`
        : t.action ? "→ " + t.action.type + (t.action.amount != null ? " $" + t.action.amount : "") : "";
      return `<div class="msg ${t.role === "user" ? "user" : "bot"}">${escapeHtml(t.text)}</div>` + (meta ? `<div class="meta">${meta}</div>` : "");
    }).join("");
    $("drawer").classList.add("open");
  }

  async function renderConnect() {
    try {
      const s = await (await api("/v1/merchants/" + encodeURIComponent($("merchant").value) + "/connect")).json();
      const b = $("connect-badge");
      if (s.connected && s.charges_enabled) { b.className = "badge ok"; b.textContent = "connected · ready"; $("connect-btn").style.display = "none"; }
      else if (s.connected) { b.className = "badge no"; b.textContent = "onboarding incomplete"; }
      else { b.className = "badge no"; b.textContent = "not connected — deals settle to platform"; }
    } catch (_) {}
  }

  async function renderLint() {
    try {
      const l = await (await api("/v1/plans/" + encodeURIComponent($("plan").value) + "/lint")).json();
      const out = (l.errors || []).map((e) => `<div class="e">⛔ ${e}</div>`).concat((l.warnings || []).map((w) => `<div class="w">⚠️ ${w}</div>`));
      $("lint").innerHTML = out.length ? out.join("") : '<span class="meta">Config lints clean.</span>';
    } catch (_) {}
  }

  $("connect-btn").onclick = async () => {
    const r = await (await apiPost("/v1/merchants/" + encodeURIComponent($("merchant").value) + "/connect/onboard", { return_url: location.href })).json();
    if (r.url) window.open(r.url, "_blank"); else alert(r.error || "could not start onboarding");
  };

  function escapeHtml(s) { return String(s).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }
  $("refresh").onclick = load;
  load();
})();
</script>
</body>
</html>
